services:
  kafka:
    image: confluentinc/cp-kafka:7.8.6
    container_name: kafka
    ports:
      - "9092:9092"

    environment:
      KAFKA_KRAFT_MODE: 'true'

      CLUSTER_ID: '1L6g7nGhU-eAKfL--X25wo'
      KAFKA_NODE_ID: 1

      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs

    volumes:
      - kafka_kraft:/var/lib/kafka/data

  redpanda-console:
    image: redpandadata/console:latest
    container_name: redpanda-console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      - kafka

  redis:
    image: redis/redis-stack:latest
    container_name: redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data

  producer-binance:
    build: .
    container_name: producer-binance
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      EXCHANGE: binance-futures
    command: ["python", "-u", "producer/ws_binance.py"]

  producer-bybit:
    build: .
    container_name: producer-bybit
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      EXCHANGE: bybit-futures
    command: ["python", "-u", "producer/ws_bybit.py"]

  spread-detector:
    build: .
    container_name: spread-detector
    restart: unless-stopped
    depends_on:
      - kafka
    environment:
      KAFKA_BROKERS: kafka:9092
      ARBITRAGE_THRESHOLD: "0.2"
      STALENESS_SECONDS: "5"
    command: ["python", "-u", "consumer/arb_detector.py"]

  redis-sink:
    build: .
    container_name: redis-sink
    restart: unless-stopped
    depends_on:
      - kafka
      - redis
    environment:
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: redis://redis:6379/0
      REDIS_KEY_TTL: "60"
      KAFKA_TOPICS: "binance-futures-ticker,bybit-futures-ticker"
    command: ["python", "-u", "consumer/redis_sink.py"]

  # ── Feature Store Infrastructure ────────────────────────────────────

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  feature-sink:
    build: .
    container_name: feature-sink
    restart: unless-stopped
    depends_on:
      - kafka
      - minio
    environment:
      KAFKA_BROKERS: kafka:9092
      FEATURE_KAFKA_TOPICS: "binance-futures-ticker,bybit-futures-ticker"
      S3_ENDPOINT_URL: http://minio:9000
      FEATURE_S3_BUCKET: feature-store
      FEATURE_S3_PREFIX: ticker_features
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      FEATURE_WINDOW_SECONDS: "300"
      FEATURE_FLUSH_INTERVAL: "60"
    command: ["python", "-u", "consumer/feature_sink.py"]

volumes:
  kafka_kraft:
  redis_data:
  minio_data: